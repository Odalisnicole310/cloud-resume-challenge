name: Deploy static website to Azure Storage

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Upload index.html to Azure Storage
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az storage blob upload \
              --container-name '$web' \
              --file index.html \
              --name index.html \
              --connection-string "${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}" \
              --overwrite true
